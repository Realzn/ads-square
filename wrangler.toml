name = "adsmostfair"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────
# Cloudflare Pages deployment configuration
# Le fichier worker.js est copié en _worker.js par le build script
# ──────────────────────────────────────────────────────────────
pages_build_output_dir = ".open-next/assets"

# ── Cron Triggers ──────────────────────────────────────────────
[triggers]
crons = [
  "0 7 * * *",   # daily tâches Sphère (07h UTC)
  "0 8 * * *",   # rappels expiration (08h UTC)
  "0 9 * * *",   # cron principal (09h UTC)
]
